services:
  web:
    build:
      context: .
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5288/}
    ports:
      - "3000:80"
    restart: unless-stopped

  web-dev:
    profiles: ["dev"]
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    env_file:
      - .env.development
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
